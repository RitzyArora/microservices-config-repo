spring.application.name=ProductService
server.port=8085
spring.datasource.url=jdbc:mysql://localhost:3306/productdb
spring.datasource.username=root
spring.datasource.password=admin@123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
jwt.secret=ThisIsAVeryLongSecretKeyForJwtAuthenticationSpringBootMicroservices123456
jwt.expiration=3600000


management.endpoints.web.exposure.include=health,info
management.health.service.enabled=true
management.endpoint.health.show-components=always

management.endpoints.health.show-details=always
management.info.env.enabled=true

info.app.name=ProductService
info.app.description=handles product operations
info.app.version=1.0.0
info.app.owner=Product Team
